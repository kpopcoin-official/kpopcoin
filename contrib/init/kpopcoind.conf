description "Kpopcoin Core Daemon"

start on runlevel [2345]
stop on starting rc RUNLEVEL=[016]

env KPOPCOIND_BIN="/usr/bin/kpopcoind"
env KPOPCOIND_USER="kpopcoin"
env KPOPCOIND_GROUP="kpopcoin"
env KPOPCOIND_PIDDIR="/var/run/kpopcoind"
# upstart can't handle variables constructed with other variables
env KPOPCOIND_PIDFILE="/var/run/kpopcoind/kpopcoind.pid"
env KPOPCOIND_CONFIGFILE="/etc/kpopcoin/kpopcoin.conf"
env KPOPCOIND_DATADIR="/var/lib/kpopcoind"

expect fork

respawn
respawn limit 5 120
kill timeout 600

pre-start script
    # this will catch non-existent config files
    # kpopcoind will check and exit with this very warning, but it can do so
    # long after forking, leaving upstart to think everything started fine.
    # since this is a commonly encountered case on install, just check and
    # warn here.
    if ! grep -qs '^rpcpassword=' "$KPOPCOIND_CONFIGFILE" ; then
        echo "ERROR: You must set a secure rpcpassword to run kpopcoind."
        echo "The setting must appear in $KPOPCOIND_CONFIGFILE"
        echo
        echo "This password is security critical to securing wallets "
        echo "and must not be the same as the rpcuser setting."
        echo "You can generate a suitable random password using the following "
        echo "command from the shell:"
        echo
        echo "bash -c 'tr -dc a-zA-Z0-9 < /dev/urandom | head -c32 && echo'"
        echo
        echo "It is recommended that you also set alertnotify so you are "
        echo "notified of problems:"
        echo
        echo "ie: alertnotify=echo %%s | mail -s \"Kpopcoin Alert\"" \
            "admin@foo.com"
        echo
        exit 1
    fi

    mkdir -p "$KPOPCOIND_PIDDIR"
    chmod 0755 "$KPOPCOIND_PIDDIR"
    chown $KPOPCOIND_USER:$KPOPCOIND_GROUP "$KPOPCOIND_PIDDIR"
    chown $KPOPCOIND_USER:$KPOPCOIND_GROUP "$KPOPCOIND_CONFIGFILE"
    chmod 0660 "$KPOPCOIND_CONFIGFILE"
end script

exec start-stop-daemon \
    --start \
    --pidfile "$KPOPCOIND_PIDFILE" \
    --chuid $KPOPCOIND_USER:$KPOPCOIND_GROUP \
    --exec "$KPOPCOIND_BIN" \
    -- \
    -pid="$KPOPCOIND_PIDFILE" \
    -conf="$KPOPCOIND_CONFIGFILE" \
    -datadir="$KPOPCOIND_DATADIR" \
    -disablewallet \
    -daemon

